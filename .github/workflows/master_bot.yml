name: Stichflow Master Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: "Step 1: Clean Project Tree"
        run: |
          echo "### 📂 Project Tree" > REPORTS_TREE.md
          echo '```text' >> REPORTS_TREE.md
          # Uses . to show relative path, ignores node_modules and existing reports
          tree . -a -I 'node_modules|.git|dist|build|REPORTS_*' >> REPORTS_TREE.md
          echo '```' >> REPORTS_TREE.md

      - name: "Steps 2 & 3: File-Wise Logic Map & Security"
        shell: python
        run: |
          import os, re
          from collections import defaultdict

          logic_by_file = defaultdict(lambda: {"purpose": "General Component/Utility", "functions": []})
          security_issues = []
          
          # Regex for logic and security
          logic_regex = re.compile(r'(function\s+(\w+)|const\s+(\w+)\s*=\s*(async\s*)?\(|router\.(get|post))')
          token_regex = re.compile(r'shpat_[a-zA-Z0-9]{32}')

          for root, dirs, files in os.walk("."):
              if any(d in root for d in ['node_modules', '.git', 'dist']): continue
              for file in files:
                  if file.endswith(('.ts', '.tsx', '.js')):
                      path = os.path.join(root, file)
                      with open(path, 'r', errors='ignore') as f:
                          content = f.read()
                          f.seek(0)
                          
                          # Heuristic for "Purpose"
                          if "login" in content.lower() or "auth" in content.lower():
                              logic_by_file[file]["purpose"] = "Handles user authentication and security flows."
                          elif "dashboard" in content.lower():
                              logic_by_file[file]["purpose"] = "Main administrative interface for managing data and items."
                          elif "api" in content.lower() or "fetch" in content.lower():
                              logic_by_file[file]["purpose"] = "Manages data fetching and external API communications."
                          elif "karigar" in content.lower() or "batch" in content.lower():
                              logic_by_file[file]["purpose"] = "Production logic for garment manufacturing and assignment."

                          for i, line in enumerate(f, 1):
                              match = logic_regex.search(line)
                              if match:
                                  name = match.group(2) or match.group(3) or "Route"
                                  logic_by_file[file]["functions"].append(name)
                              if token_regex.search(line):
                                  security_issues.append(f"| `{file}` | Line {i} | Hardcoded Token | ❌ Critical |")

          # Write Grouped Logic Map
          with open("REPORTS_LOGIC_MAP.md", "w") as f:
              f.write("### 🧠 Detailed Code Map (File-Wise Summary)\n")
              for file, data in logic_by_file.items():
                  f.write(f"\n#### 📄 {file}\n")
                  f.write(f"**Purpose:** {data['purpose']}\n\n")
                  f.write("**Key Logic/Functions:**\n")
                  f.write("> " + ", ".join(set(data['functions'])) + "\n")

          # Write Security Report
          with open("REPORTS_SECURITY.md", "w") as f:
              f.write("### 🛡️ Security & Health Report\n\n| File | Location | Issue Type | Severity |\n| :--- | :--- | :--- | :--- |\n")
              f.write("\n".join(security_issues) if security_issues else "| All Files | N/A | No security holes found | ✅ Pass |")

      - name: "Final: Single Commit and Push"
        run: |
          git config --local user.email "bot@stichflow.io"
          git config --local user.name "stichflow-master-bot"
          git add REPORTS_TREE.md REPORTS_LOGIC_MAP.md REPORTS_SECURITY.md
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs: generate descriptive reports [skip ci]"
            git push
          fi
