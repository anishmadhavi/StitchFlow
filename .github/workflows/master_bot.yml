name: Stichflow Master Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: "Step 1: Clean Project Tree"
        run: |
          echo "### 📂 Project Tree" > REPORTS_TREE.md
          echo '```text' >> REPORTS_TREE.md
          # -a shows hidden files, . ensures local path, -I ignores noise
          tree . -a -I 'node_modules|.git|dist|build|REPORTS_*|RECENT_CHANGES*' >> REPORTS_TREE.md
          echo '```' >> REPORTS_TREE.md

      - name: "Step 2 & 3: Logic Map & Security Scanner"
        shell: python
        run: |
          import os, re
          from collections import defaultdict

          logic_by_file = defaultdict(list)
          security_issues = []
          
          # Regex for logic and security
          logic_regex = re.compile(r'(function\s+(\w+)|const\s+(\w+)\s*=\s*(async\s*)?\(|router\.(get|post))')
          token_regex = re.compile(r'shpat_[a-zA-Z0-9]{32}')

          for root, dirs, files in os.walk("."):
              # Ignore system/dependency folders
              if any(d in root for d in ['node_modules', '.git', 'dist']): continue
              for file in files:
                  if file.endswith(('.ts', '.tsx', '.js')):
                      path = os.path.join(root, file)
                      with open(path, 'r', errors='ignore') as f:
                          for i, line in enumerate(f, 1):
                              # Logic detection
                              match = logic_regex.search(line)
                              if match:
                                  name = match.group(2) or match.group(3) or "Anonymous/Route"
                                  logic_by_file[file].append(f"Line {i}: `{name}`")
                              
                              # Security detection
                              if token_regex.search(line):
                                  security_issues.append(f"| `{file}` | Line {i} | Hardcoded Token | ❌ Critical |")

          # Write Grouped Logic Map
          with open("REPORTS_LOGIC_MAP.md", "w") as f:
              f.write("### 🧠 Detailed Code Map (File-Wise)\n")
              for file, functions in logic_by_file.items():
                  f.write(f"\n#### 📄 {file}\n")
                  f.write("> " + ", ".join(functions) + "\n")

          # Write Security Report
          with open("REPORTS_SECURITY.md", "w") as f:
              f.write("### 🛡️ Security & Health Report\n\n| File | Location | Issue Type | Severity |\n| :--- | :--- | :--- | :--- |\n")
              f.write("\n".join(security_issues) if security_issues else "| All Files | N/A | No security holes found | ✅ Pass |")

      - name: "Final: Single Commit and Push"
        run: |
          git config --local user.email "bot@stichflow.io"
          git config --local user.name "stichflow-master-bot"
          # We only add the 3 reports you want to keep
          git add REPORTS_TREE.md REPORTS_LOGIC_MAP.md REPORTS_SECURITY.md
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs: sync project reports [skip ci]"
            git push
          fi
